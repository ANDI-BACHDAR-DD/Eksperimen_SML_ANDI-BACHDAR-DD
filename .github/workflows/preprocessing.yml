name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'heart_disease_raw/**'
      - 'preprocessing/automate_NamaSiswa.py'
  workflow_dispatch:
    inputs:
      input_path:
        description: 'Path ke dataset raw'
        required: false
        default: 'heart_disease_raw/heart_disease.csv'
      output_dir:
        description: 'Direktori output preprocessing'
        required: false
        default: 'preprocessing/heart_disease_preprocessing'

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run preprocessing pipeline
        run: |
          python preprocessing/automate_NamaSiswa.py \
            --input ${{ github.event.inputs.input_path || 'heart_disease_raw/heart_disease.csv' }} \
            --output ${{ github.event.inputs.output_dir || 'preprocessing/heart_disease_preprocessing' }}

      - name: Verify output files
        run: |
          echo "=== Verifikasi Output Preprocessing ==="
          ls -la preprocessing/heart_disease_preprocessing/
          echo ""
          echo "=== Ukuran File ==="
          wc -l preprocessing/heart_disease_preprocessing/*.csv

      - name: Upload preprocessed dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-preprocessed-${{ github.run_number }}
          path: preprocessing/heart_disease_preprocessing/
          retention-days: 30

      - name: Commit preprocessed data to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/heart_disease_preprocessing/
          git diff --cached --quiet || git commit -m "chore: update preprocessed dataset [run #${{ github.run_number }}]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
